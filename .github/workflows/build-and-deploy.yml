name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Skip the automated CSS commit to avoid infinite loop
    if: "!contains(github.event.head_commit.message, '[automated]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # --- Build Tailwind CSS ---
      - name: Install Tailwind CSS
        run: npm install -D tailwindcss@3.4.17

      - name: Build CSS
        run: npx tailwindcss -i assets/tailwind-input.css -o assets/tailwind.css --minify

      - name: Commit CSS if changed
        id: css
        run: |
          git diff --quiet assets/tailwind.css && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
          if [ "$(git diff --quiet assets/tailwind.css; echo $?)" != "0" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/tailwind.css
            git commit -m "Rebuild Tailwind CSS [automated]"
            git push
          fi

      # --- Deploy (always uses the freshly built CSS) ---
      - name: Write production robots.txt
        run: |
          cat > robots.txt <<'ROBOTS'
          # Robots.txt for ie-gf.org
          # Allow all crawlers full access.

          User-agent: *
          Allow: /

          Sitemap: https://ie-gf.org/sitemap.xml
          ROBOTS

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            docs/**
            landing.html
            map-app.html
            map-landing.html
            map-program.html
            market-access-program.html
