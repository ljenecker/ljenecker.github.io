name: Deploy to ie-gf.org

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Build Tailwind CSS"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if triggered by workflow_run that failed, or if this push
    # was the automated CSS commit (to avoid infinite loop)
    if: >
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[automated]')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Always deploy latest main

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          server-dir: /public_html/
