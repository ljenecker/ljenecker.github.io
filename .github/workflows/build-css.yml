name: Build Tailwind CSS

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'tailwind.config.js'
      - 'assets/tailwind-input.css'
      - '.github/workflows/build-css.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tailwind CSS
        run: npm install -D tailwindcss@3.4.17

      - name: Build CSS
        run: npx tailwindcss -i assets/tailwind-input.css -o assets/tailwind.css --minify

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet assets/tailwind.css && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated CSS
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tailwind.css
          git commit -m "Rebuild Tailwind CSS [automated]"
          git push
